name: Fetch Moel Notices

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data

      - name: Fetch moel notice list and save JSON
        run: |
          HTML=$(curl -sk --max-time 15 "https://www.moel.go.kr/news/notice/noticeList.do")
          JSON=$(node -e "
            const html = \`$HTML\`;
            const base = 'https://www.moel.go.kr';
            const blocks = html.split('<tr').slice(1);
            const notices = [];
            for (const block of blocks) {
              const aMatch = block.match(/href=['\""]([^'\"]*noticeView[^'\"]*)['\"][^>]*>([\s\S]*?)<\/a>/);
              if (!aMatch) continue;
              const href = aMatch[1];
              const title = aMatch[2].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
              if (!title.startsWith('[공고]')) continue;
              const dateMatch = block.match(/(\d{4})[.\-](\d{2})[.\-](\d{2})/);
              const date = dateMatch ? dateMatch[0].replace(/\./g, '-') : '';
              const link = href.startsWith('http') ? href : base + href;
              notices.push({ title, link, date });
              if (notices.length >= 5) break;
            }
            process.stdout.write(JSON.stringify(notices));
          ")
          echo "Fetched: $JSON"
          echo "$JSON" > moel-notices.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add moel-notices.json
          git diff --cached --quiet || git commit -m "update moel notices $(date -u '+%Y-%m-%d %H:%M')"
          git push origin data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
